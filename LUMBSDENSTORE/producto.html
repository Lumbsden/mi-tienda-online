<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Producto | LumsbdenStore</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<header>

    <img src="img/lumbsdenlogo.jpeg" alt="Logo LumsbdenStore">

    <h1>LumsbdenStore</h1>


    <nav>

        <a href="index.html">Inicio</a>

        <a href="index.html#moda">Moda</a>

        <a href="index.html#electronica">Electrónica</a>

        <a href="#">Carrito 🛒</a>

    </nav>


</header>




<main>


<section class="detalle-producto">



    <!-- IMAGEN DEL PRODUCTO -->

    <div class="imagen-producto">

        <img id="imagenProducto" src="" alt="Producto">

    </div>





    <!-- INFORMACIÓN DEL PRODUCTO -->

    <div class="informacion-producto">


        <h2 id="nombreProducto">
            
        </h2>



        <p id="precioProducto" class="precio">

        </p>





        <h3>
            Descripción:
        </h3>


        <p id="descripcionProducto">

        </p>






        <h3>
            Selecciona talla:
        </h3>


        <div id="tallas" class="tallas">

        </div>






        <div class="compra">


            <div class="cantidad">


                <button id="menos">
                    -
                </button>


                <span id="cantidad">
                    1
                </span>


                <button id="mas">
                    +
                </button>


            </div>





            <button class="agregar-carrito">

                Agregar al carrito 🛒

            </button>



        </div>




    </div>



</section>



</main>





<script src="js/carrito.js"></script>
<script src="js/app.js"></script>

</body>

</html>
